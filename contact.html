    <div class="page-container mt-5 pt-4">

    <div id="contact" class="page"></div>
            <div class="container pb-5">
                <div class="row g-5">
                    <div class="col-lg-4">
                        <div class="sticky-top" style="top: 100px;">
                            <h2 class="mb-4">Get In Touch</h2>
                            
                            <div class="mb-4 d-flex align-items-center">
                                <div class="p-3 bg-white border me-3"><i class="bi bi-envelope fs-5"></i></div>
                                <div>
                                    <p class="mb-0 xsmall fw-bold text-uppercase text-muted" style="font-family: 'Inter', sans-serif;">Email Me</p>
                                    <p class="mb-0 small fw-bold">nhoang2@umbc.edu</p>
                                </div>
                            </div>
                            <div class="mb-4 d-flex align-items-center">
                                <div class="p-3 bg-white border me-3"><i class="bi bi-geo-alt fs-5"></i></div>
                                <div>
                                    <p class="mb-0 xsmall fw-bold text-uppercase text-muted" style="font-family: 'Inter', sans-serif;">Location</p>
                                    <p class="mb-0 small fw-bold">Maryland</p>
                                </div>
                            </div>
                            
                            <hr class="my-5">
                            <h6 class="text-uppercase xsmall fw-bold tracking-widest mb-3" style="font-family: 'Inter', sans-serif;">Social Connections</h6>
                            <div class="d-flex gap-3">
                                <a href="#" class="text-dark fs-4"><i class="bi bi-linkedin"></i></a>
                                <a href="#" class="text-dark fs-4"><i class="bi bi-github"></i></a>
                                <a href="#" class="text-dark fs-4"><i class="bi bi-twitter-x"></i></a>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="card card-custom shadow-lg border-0">
                            <div class="card-body p-4 p-md-5">
                                <h4 class="mb-4 fw-bold">Send a Message</h4>
                                
                                <div id="successAlert" class="alert alert-success d-none mb-4 rounded-0 fade show" role="alert">
                                    <i class="bi bi-check-circle-fill me-2"></i> Message sent successfully.
                                </div>

                                <form id="contactForm" class="needs-validation" novalidate>
                                    <div class="row">
                                        <div class="col-md-6 mb-4">
                                            <label class="form-label small fw-bold text-uppercase" style="font-family: 'Inter', sans-serif;">First Name</label>
                                            <input type="text" class="form-control" placeholder="John" required>
                                        </div>
                                        <div class="col-md-6 mb-4">
                                            <label class="form-label small fw-bold text-uppercase" style="font-family: 'Inter', sans-serif;">Last Name</label>
                                            <input type="text" class="form-control" placeholder="Doe" required>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label small fw-bold text-uppercase" style="font-family: 'Inter', sans-serif;">Email Address</label>
                                        <input type="email" class="form-control" placeholder="john.doe@email.com" required>
                                    </div>
                                    <div class="mb-5">
                                        <label class="form-label small fw-bold text-uppercase" style="font-family: 'Inter', sans-serif;">Message</label>
                                        <textarea class="form-control" rows="5" placeholder="How can I help you?" required></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-custom-dark w-100 py-3">SEND MESSAGE</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
